# alembic.ini — Alembic configuration (P0-4.4)
# DATABASE_URL is resolved by alembic/env.py from the environment.
# Do NOT commit real connection strings here.

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
timezone = UTC
prepend_sys_path = .

# Placeholder — env.py reads DATABASE_URL from the environment at runtime.
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/geoint

# Version path separator is OS independent
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S

